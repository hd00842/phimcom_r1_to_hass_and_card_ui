input_text:
  phicomm_r1_music_query:
    name: Phicomm R1 Music Query
    max: 255
  phicomm_r1_youtube_video_id:
    name: Phicomm R1 YouTube Video ID
    max: 128
  phicomm_r1_zing_song_id:
    name: Phicomm R1 Zing Song ID
    max: 128
  phicomm_r1_chat_text:
    name: Phicomm R1 Chat Text
    max: 255
  phicomm_r1_run_command:
    name: Phicomm R1 Run Command
    max: 255
  phicomm_r1_run_type_id:
    name: Phicomm R1 Run Type ID
    max: 64
    initial: myshell
  phicomm_r1_send_message_obj:
    name: Phicomm R1 Send Message Obj
    max: 64
    initial: true
  phicomm_r1_send_message_type_id:
    name: Phicomm R1 Send Message Type ID
    max: 64
  phicomm_r1_ws_payload:
    name: Phicomm R1 WS Payload JSON
    max: 255
    initial: '{"type":"get_info"}'
  phicomm_r1_ws_expect_type:
    name: Phicomm R1 WS Expect Type
    max: 64
  phicomm_r1_mixer_control_name:
    name: Phicomm R1 Mixer Control Name
    max: 64
    initial: DAC Digital Volume L

input_boolean:
  phicomm_r1_wake_word_enabled:
    name: Phicomm R1 Wake Word Enabled
    initial: true
  phicomm_r1_anti_deaf_enabled:
    name: Phicomm R1 Chống Điếc AI Enabled
    initial: true
  phicomm_r1_dlna_enabled:
    name: Phicomm R1 DLNA Enabled
  phicomm_r1_airplay_enabled:
    name: Phicomm R1 AirPlay Enabled
  phicomm_r1_bluetooth_enabled:
    name: Phicomm R1 Bluetooth Enabled
  phicomm_r1_main_light_enabled:
    name: Phicomm R1 Main Light Enabled
  phicomm_r1_edge_light_enabled:
    name: Phicomm R1 Edge Light Enabled
  phicomm_r1_bass_enabled:
    name: Phicomm R1 Bass Enabled
  phicomm_r1_loudness_enabled:
    name: Phicomm R1 Loudness Enabled
  phicomm_r1_eq_enabled:
    name: Phicomm R1 EQ Enabled

input_number:
  phicomm_r1_wake_word_sensitivity:
    name: Phicomm R1 Wake Word Sensitivity
    min: 0
    max: 1
    step: 0.01
    mode: slider
    initial: 0.5
  phicomm_r1_light_mode:
    name: Phicomm R1 Light Mode
    min: 0
    max: 20
    step: 1
    mode: box
    initial: 0
  phicomm_r1_light_speed:
    name: Phicomm R1 Light Speed
    min: 1
    max: 100
    step: 1
    mode: slider
    initial: 50
  phicomm_r1_light_brightness:
    name: Phicomm R1 Light Brightness
    min: 1
    max: 200
    step: 1
    mode: slider
    initial: 100
  phicomm_r1_edge_light_intensity:
    name: Phicomm R1 Edge Light Intensity
    min: 0
    max: 100
    step: 1
    mode: slider
    initial: 50
  phicomm_r1_bass_strength:
    name: Phicomm R1 Bass Strength
    min: -20
    max: 20
    step: 1
    mode: slider
    initial: 0
  phicomm_r1_loudness_gain:
    name: Phicomm R1 Loudness Gain
    min: -20
    max: 20
    step: 1
    mode: slider
    initial: 0
  phicomm_r1_eq_band:
    name: Phicomm R1 EQ Band
    min: 0
    max: 9
    step: 1
    mode: box
    initial: 0
  phicomm_r1_eq_level:
    name: Phicomm R1 EQ Level
    min: -15
    max: 15
    step: 1
    mode: slider
    initial: 0
  phicomm_r1_mixer_value:
    name: Phicomm R1 Mixer Value
    min: 0
    max: 255
    step: 1
    mode: slider
    initial: 100
  phicomm_r1_play_mode:
    name: Phicomm R1 Play Mode
    min: 0
    max: 5
    step: 1
    mode: box
    initial: 0
  phicomm_r1_keycode:
    name: Phicomm R1 Keycode
    min: 1
    max: 300
    step: 1
    mode: box
    initial: 85
  phicomm_r1_send_message_what:
    name: Phicomm R1 Send Message What
    min: 0
    max: 99999
    step: 1
    mode: box
    initial: 0
  phicomm_r1_send_message_arg1:
    name: Phicomm R1 Send Message Arg1
    min: 0
    max: 99999
    step: 1
    mode: box
    initial: 0
  phicomm_r1_send_message_arg2:
    name: Phicomm R1 Send Message Arg2
    min: -1
    max: 99999
    step: 1
    mode: box
    initial: -1

script:
  phicomm_r1_search_youtube:
    alias: Phicomm R1 Search YouTube
    mode: single
    sequence:
      - service: phicomm_r1.search_youtube
        target:
          entity_id: media_player.phicomm_r1
        data:
          query: "{{ states('input_text.phicomm_r1_music_query') }}"

  phicomm_r1_search_playlist:
    alias: Phicomm R1 Search YouTube Playlist
    mode: single
    sequence:
      - service: phicomm_r1.search_playlist
        target:
          entity_id: media_player.phicomm_r1
        data:
          query: "{{ states('input_text.phicomm_r1_music_query') }}"

  phicomm_r1_search_zing:
    alias: Phicomm R1 Search Zing
    mode: single
    sequence:
      - service: phicomm_r1.search_zing
        target:
          entity_id: media_player.phicomm_r1
        data:
          query: "{{ states('input_text.phicomm_r1_music_query') }}"

  phicomm_r1_play_youtube:
    alias: Phicomm R1 Play YouTube By ID
    mode: single
    sequence:
      - service: phicomm_r1.play_youtube
        target:
          entity_id: media_player.phicomm_r1
        data:
          video_id: "{{ states('input_text.phicomm_r1_youtube_video_id') }}"

  phicomm_r1_play_zing:
    alias: Phicomm R1 Play Zing By ID
    mode: single
    sequence:
      - service: phicomm_r1.play_zing
        target:
          entity_id: media_player.phicomm_r1
        data:
          song_id: "{{ states('input_text.phicomm_r1_zing_song_id') }}"

  phicomm_r1_play_first_result:
    alias: Phicomm R1 Play First Search Result
    mode: single
    sequence:
      - variables:
          last: "{{ state_attr('media_player.phicomm_r1', 'last_music_search') }}"
          source: "{{ (last.source if last else '') | lower }}"
          first_id: >-
            {% if last and last.items and last.items[0] and last.items[0].id %}
              {{ last.items[0].id }}
            {% else %}
              
            {% endif %}
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ source == 'zingmp3' and first_id | trim != '' }}"
            sequence:
              - service: phicomm_r1.play_zing
                target:
                  entity_id: media_player.phicomm_r1
                data:
                  song_id: "{{ first_id }}"
          - conditions:
              - condition: template
                value_template: "{{ source in ['youtube', 'youtube_playlist'] and first_id | trim != '' }}"
            sequence:
              - service: phicomm_r1.play_youtube
                target:
                  entity_id: media_player.phicomm_r1
                data:
                  video_id: "{{ first_id }}"

  phicomm_r1_wake_word_on:
    alias: Phicomm R1 Wake Word On
    mode: single
    sequence:
      - service: phicomm_r1.wake_word_set_enabled
        target:
          entity_id: media_player.phicomm_r1
        data:
          enabled: true

  phicomm_r1_wake_word_off:
    alias: Phicomm R1 Wake Word Off
    mode: single
    sequence:
      - service: phicomm_r1.wake_word_set_enabled
        target:
          entity_id: media_player.phicomm_r1
        data:
          enabled: false

  phicomm_r1_wake_word_apply:
    alias: Phicomm R1 Wake Word Apply Toggle
    mode: single
    sequence:
      - service: phicomm_r1.wake_word_set_enabled
        target:
          entity_id: media_player.phicomm_r1
        data:
          enabled: "{{ is_state('input_boolean.phicomm_r1_wake_word_enabled', 'on') }}"

  phicomm_r1_wake_word_set_sensitivity:
    alias: Phicomm R1 Wake Word Set Sensitivity
    mode: single
    sequence:
      - service: phicomm_r1.wake_word_set_sensitivity
        target:
          entity_id: media_player.phicomm_r1
        data:
          sensitivity: "{{ states('input_number.phicomm_r1_wake_word_sensitivity') | float(0.5) }}"

  phicomm_r1_wake_word_refresh:
    alias: Phicomm R1 Wake Word Refresh
    mode: single
    sequence:
      - service: phicomm_r1.wake_word_get_enabled
        target:
          entity_id: media_player.phicomm_r1
      - service: phicomm_r1.wake_word_get_sensitivity
        target:
          entity_id: media_player.phicomm_r1

  phicomm_r1_anti_deaf_ai_on:
    alias: Phicomm R1 Anti-Deaf AI On
    mode: single
    sequence:
      - service: phicomm_r1.anti_deaf_ai_set_enabled
        target:
          entity_id: media_player.phicomm_r1
        data:
          enabled: true

  phicomm_r1_anti_deaf_ai_off:
    alias: Phicomm R1 Anti-Deaf AI Off
    mode: single
    sequence:
      - service: phicomm_r1.anti_deaf_ai_set_enabled
        target:
          entity_id: media_player.phicomm_r1
        data:
          enabled: false

  phicomm_r1_anti_deaf_ai_apply:
    alias: Phicomm R1 Anti-Deaf AI Apply Toggle
    mode: single
    sequence:
      - service: phicomm_r1.anti_deaf_ai_set_enabled
        target:
          entity_id: media_player.phicomm_r1
        data:
          enabled: "{{ is_state('input_boolean.phicomm_r1_anti_deaf_enabled', 'on') }}"

  phicomm_r1_anti_deaf_ai_refresh:
    alias: Phicomm R1 Anti-Deaf AI Refresh
    mode: single
    sequence:
      - service: phicomm_r1.anti_deaf_ai_get_enabled
        target:
          entity_id: media_player.phicomm_r1

  phicomm_r1_chat_wake_up:
    alias: Phicomm R1 Chat Wake Up
    mode: single
    sequence:
      - service: phicomm_r1.chat_wake_up
        target:
          entity_id: media_player.phicomm_r1

  phicomm_r1_chat_test_mic:
    alias: Phicomm R1 Chat Test Mic
    mode: single
    sequence:
      - service: phicomm_r1.chat_test_mic
        target:
          entity_id: media_player.phicomm_r1

  phicomm_r1_chat_send_text:
    alias: Phicomm R1 Chat Send Text
    mode: single
    sequence:
      - service: phicomm_r1.chat_send_text
        target:
          entity_id: media_player.phicomm_r1
        data:
          text: "{{ states('input_text.phicomm_r1_chat_text') }}"

  phicomm_r1_chat_refresh:
    alias: Phicomm R1 Chat Refresh
    mode: single
    sequence:
      - service: phicomm_r1.chat_get_state
        target:
          entity_id: media_player.phicomm_r1
      - service: phicomm_r1.chat_get_history
        target:
          entity_id: media_player.phicomm_r1

  phicomm_r1_set_dlna:
    alias: Phicomm R1 Set DLNA
    mode: single
    sequence:
      - service: phicomm_r1.set_dlna
        target:
          entity_id: media_player.phicomm_r1
        data:
          enabled: "{{ is_state('input_boolean.phicomm_r1_dlna_enabled', 'on') }}"

  phicomm_r1_set_airplay:
