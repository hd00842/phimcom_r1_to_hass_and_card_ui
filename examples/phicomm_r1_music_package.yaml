    mode: single
    sequence:
      - service: phicomm_r1.set_airplay
        target:
          entity_id: media_player.phicomm_r1
        data:
          enabled: "{{ is_state('input_boolean.phicomm_r1_airplay_enabled', 'on') }}"

  phicomm_r1_set_bluetooth:
    alias: Phicomm R1 Set Bluetooth
    mode: single
    sequence:
      - service: phicomm_r1.set_bluetooth
        target:
          entity_id: media_player.phicomm_r1
        data:
          enabled: "{{ is_state('input_boolean.phicomm_r1_bluetooth_enabled', 'on') }}"

  phicomm_r1_set_main_light:
    alias: Phicomm R1 Set Main Light
    mode: single
    sequence:
      - service: phicomm_r1.set_main_light
        target:
          entity_id: media_player.phicomm_r1
        data:
          enabled: "{{ is_state('input_boolean.phicomm_r1_main_light_enabled', 'on') }}"

  phicomm_r1_set_light_mode:
    alias: Phicomm R1 Set Light Mode
    mode: single
    sequence:
      - service: phicomm_r1.set_light_mode
        target:
          entity_id: media_player.phicomm_r1
        data:
          mode: "{{ states('input_number.phicomm_r1_light_mode') | int(0) }}"

  phicomm_r1_set_light_speed:
    alias: Phicomm R1 Set Light Speed
    mode: single
    sequence:
      - service: phicomm_r1.set_light_speed
        target:
          entity_id: media_player.phicomm_r1
        data:
          speed: "{{ states('input_number.phicomm_r1_light_speed') | int(50) }}"

  phicomm_r1_set_light_brightness:
    alias: Phicomm R1 Set Light Brightness
    mode: single
    sequence:
      - service: phicomm_r1.set_light_brightness
        target:
          entity_id: media_player.phicomm_r1
        data:
          brightness: "{{ states('input_number.phicomm_r1_light_brightness') | int(100) }}"

  phicomm_r1_set_edge_light:
    alias: Phicomm R1 Set Edge Light
    mode: single
    sequence:
      - service: phicomm_r1.set_edge_light
        target:
          entity_id: media_player.phicomm_r1
        data:
          enabled: "{{ is_state('input_boolean.phicomm_r1_edge_light_enabled', 'on') }}"
          intensity: "{{ states('input_number.phicomm_r1_edge_light_intensity') | int(50) }}"

  phicomm_r1_set_bass_enable:
    alias: Phicomm R1 Set Bass Enable
    mode: single
    sequence:
      - service: phicomm_r1.set_bass_enable
        target:
          entity_id: media_player.phicomm_r1
        data:
          enabled: "{{ is_state('input_boolean.phicomm_r1_bass_enabled', 'on') }}"

  phicomm_r1_set_bass_strength:
    alias: Phicomm R1 Set Bass Strength
    mode: single
    sequence:
      - service: phicomm_r1.set_bass_strength
        target:
          entity_id: media_player.phicomm_r1
        data:
          strength: "{{ states('input_number.phicomm_r1_bass_strength') | int(0) }}"

  phicomm_r1_set_loudness_enable:
    alias: Phicomm R1 Set Loudness Enable
    mode: single
    sequence:
      - service: phicomm_r1.set_loudness_enable
        target:
          entity_id: media_player.phicomm_r1
        data:
          enabled: "{{ is_state('input_boolean.phicomm_r1_loudness_enabled', 'on') }}"

  phicomm_r1_set_loudness_gain:
    alias: Phicomm R1 Set Loudness Gain
    mode: single
    sequence:
      - service: phicomm_r1.set_loudness_gain
        target:
          entity_id: media_player.phicomm_r1
        data:
          gain: "{{ states('input_number.phicomm_r1_loudness_gain') | int(0) }}"

  phicomm_r1_set_eq_enable:
    alias: Phicomm R1 Set EQ Enable
    mode: single
    sequence:
      - service: phicomm_r1.set_eq_enable
        target:
          entity_id: media_player.phicomm_r1
        data:
          enabled: "{{ is_state('input_boolean.phicomm_r1_eq_enabled', 'on') }}"

  phicomm_r1_set_eq_bandlevel:
    alias: Phicomm R1 Set EQ Band Level
    mode: single
    sequence:
      - service: phicomm_r1.set_eq_bandlevel
        target:
          entity_id: media_player.phicomm_r1
        data:
          band: "{{ states('input_number.phicomm_r1_eq_band') | int(0) }}"
          level: "{{ states('input_number.phicomm_r1_eq_level') | int(0) }}"

  phicomm_r1_set_mixer_value:
    alias: Phicomm R1 Set Mixer Value
    mode: single
    sequence:
      - service: phicomm_r1.set_mixer_value
        target:
          entity_id: media_player.phicomm_r1
        data:
          control_name: "{{ states('input_text.phicomm_r1_mixer_control_name') }}"
          value: "{{ states('input_number.phicomm_r1_mixer_value') | int(100) }}"

  phicomm_r1_set_play_mode:
    alias: Phicomm R1 Set Play Mode
    mode: single
    sequence:
      - service: phicomm_r1.set_play_mode
        target:
          entity_id: media_player.phicomm_r1
        data:
          mode: "{{ states('input_number.phicomm_r1_play_mode') | int(0) }}"

  phicomm_r1_send_keycode:
    alias: Phicomm R1 Send Keycode
    mode: single
    sequence:
      - service: phicomm_r1.send_keycode
        target:
          entity_id: media_player.phicomm_r1
        data:
          keycode: "{{ states('input_number.phicomm_r1_keycode') | int(85) }}"

  phicomm_r1_run_command:
    alias: Phicomm R1 Run Command
    mode: single
    sequence:
      - service: phicomm_r1.run_command
        target:
          entity_id: media_player.phicomm_r1
        data:
          command: "{{ states('input_text.phicomm_r1_run_command') }}"
          type_id: "{{ states('input_text.phicomm_r1_run_type_id') }}"

  phicomm_r1_send_message:
    alias: Phicomm R1 Send Message
    mode: single
    sequence:
      - service: phicomm_r1.send_message
        target:
          entity_id: media_player.phicomm_r1
        data:
          what: "{{ states('input_number.phicomm_r1_send_message_what') | int(0) }}"
          arg1: "{{ states('input_number.phicomm_r1_send_message_arg1') | int(0) }}"
          arg2: "{{ states('input_number.phicomm_r1_send_message_arg2') | int(-1) }}"
          obj: "{{ states('input_text.phicomm_r1_send_message_obj') }}"
          type_id: "{{ states('input_text.phicomm_r1_send_message_type_id') }}"

  phicomm_r1_ws_send_payload:
    alias: Phicomm R1 WS Send Payload
    mode: single
    sequence:
      - service: phicomm_r1.ws_send_payload
        target:
          entity_id: media_player.phicomm_r1
        data:
          payload: "{{ states('input_text.phicomm_r1_ws_payload') }}"
          expect_type: "{{ states('input_text.phicomm_r1_ws_expect_type') }}"

  phicomm_r1_reboot:
    alias: Phicomm R1 Reboot
    mode: single
    sequence:
      - service: phicomm_r1.reboot
        target:
          entity_id: media_player.phicomm_r1

  phicomm_r1_refresh_all:
    alias: Phicomm R1 Refresh All State
    mode: single
    sequence:
      - service: homeassistant.update_entity
        target:
          entity_id: media_player.phicomm_r1
      - service: phicomm_r1.wake_word_get_enabled
        target:
          entity_id: media_player.phicomm_r1
      - service: phicomm_r1.wake_word_get_sensitivity
        target:
          entity_id: media_player.phicomm_r1
      - service: phicomm_r1.anti_deaf_ai_get_enabled
        target:
          entity_id: media_player.phicomm_r1
      - service: phicomm_r1.chat_get_state
        target:
          entity_id: media_player.phicomm_r1
